name: API Drift CI
description: >-
  OpenAPI PR checks: sticky comment, optional CI fail, Actions job summary, repo policy TOML for oasdiff ignores. oasdiff.
branding:
  icon: git-compare
  color: blue

inputs:
  spec-path:
    description: Repository-relative path to the OpenAPI document (YAML or JSON), compared at base SHA vs head SHA.
    required: true
  oasdiff-version:
    description: oasdiff release version (without leading v), e.g. 1.15.0.
    required: false
    default: "1.15.0"
  fail-on-breaking:
    description: When true, the step fails if oasdiff reports breaking changes (ERR level).
    required: false
    default: "true"
  comment-title:
    description: Heading shown at the top of the PR comment.
    required: false
    default: OpenAPI drift
  max-changelog-chars:
    description: Truncate the changelog section after this many characters to keep comments readable.
    required: false
    default: "14000"
  allow-external-refs:
    description: When false, passes --allow-external-refs=false to oasdiff (safer for untrusted fork PRs; breaks specs that $ref external URLs).
    required: false
    default: "true"
  policy-file:
    description: Optional repo-relative path on the PR head to a TOML policy file. If unset, tries .api-drift-ci.toml then api-drift-ci.toml when present.
    required: false
    default: ""
  github-token:
    description: Token with pull-requests write (typically secrets.GITHUB_TOKEN or github.token).
    required: true

outputs:
  breaking-exit-code:
    description: Exit code from oasdiff breaking --fail-on ERR (after policy ignores). 0 means no ERR-level breaking changes.
    value: ${{ steps.api_drift.outputs.breaking-exit-code }}

runs:
  using: composite
  steps:
    - id: api_drift
      name: Compare OpenAPI and upsert PR comment
      shell: bash
      env:
        SPEC_PATH: ${{ inputs.spec-path }}
        OASDIFF_VERSION: ${{ inputs.oasdiff-version }}
        FAIL_ON_BREAKING: ${{ inputs.fail-on-breaking }}
        COMMENT_TITLE: ${{ inputs.comment-title }}
        MAX_CHANGELOG_CHARS: ${{ inputs.max-changelog-chars }}
        ALLOW_EXTERNAL_REFS: ${{ inputs.allow-external-refs }}
        POLICY_FILE: ${{ inputs.policy-file }}
        PRODUCT_REPOSITORY: ${{ github.action_repository }}
        PR_HTML_URL: ${{ github.event.pull_request.html_url }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: bash "${{ github.action_path }}/run.sh"
