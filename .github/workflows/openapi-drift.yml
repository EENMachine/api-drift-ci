name: OpenAPI drift

on:
  pull_request:
    paths:
      - "examples/**"
      - "action.yml"
      - "run.sh"
      - "scripts/**"
      - ".github/**"
      - "docs/**"
      - "README.md"
      - "CODE_OF_CONDUCT.md"
      - "LICENSE"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"

permissions:
  contents: read
  pull-requests: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          spec-path: examples/spec/openapi.yaml
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-breaking: "false"
